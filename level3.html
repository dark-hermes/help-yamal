<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom Object Quiz</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            overflow: hidden;
            background-color: #f0f0f0;
        }
        
        #gameCanvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        
        #whiteboard {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70%;
            height: 60%;
            background-color: white;
            border: 15px solid #ccc;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0,0,0,0.3);
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }
        
        #quiz-container {
            width: 90%;
            height: 90%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
        }
        
        #speaker {
            font-weight: bold;
            font-size: 1.5em;
            color: #4CAF50;
            margin-bottom: 10px;
        }
        
        #clue-text {
            font-size: 24px;
            margin: 20px 0;
            min-height: 60px;
            font-weight: bold;
            text-align: center;
        }
        
        #letter-boxes {
            display: flex;
            justify-content: center;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        
        .letter-box {
            width: 40px;
            height: 40px;
            border: 2px solid #4CAF50;
            margin: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
            background-color: white;
        }
        
        #answer-input {
            padding: 12px 20px;
            font-size: 18px;
            width: 80%;
            border: 2px solid #ddd;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        #submit-btn, #next-btn {
            padding: 12px 30px;
            font-size: 18px;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
            margin: 5px;
        }
        
        #submit-btn {
            background-color: #4CAF50;
        }
        
        #submit-btn:hover {
            background-color: #45a049;
        }
        
        #next-btn {
            background-color: #2196F3;
            display: none;
        }
        
        #next-btn:hover {
            background-color: #0b7dda;
        }
        
        #feedback {
            font-size: 20px;
            margin: 20px 0;
            min-height: 30px;
            font-weight: bold;
        }
        
        .correct {
            color: green;
        }
        
        .incorrect {
            color: red;
        }
        
        #progress {
            margin-top: 10px;
            color: #666;
        }
        
        #score-display {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(255, 255, 255, 0.7);
            padding: 10px;
            border-radius: 5px;
            font-size: 18px;
            font-weight: bold;
            color: #4CAF50;
            z-index: 3;
        }
        
        #timer-display {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.7);
            padding: 10px;
            border-radius: 5px;
            font-size: 18px;
            font-weight: bold;
            color: #333;
            z-index: 3;
        }
        
        #musicControl {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(255, 255, 255, 0.7);
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            z-index: 3;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="whiteboard">
        <div id="quiz-container">
            <div id="speaker">ME</div>
            <div id="clue-text">Loading game...</div>
            <div id="letter-boxes"></div>
            <input type="text" id="answer-input" placeholder="Type your answer here..." autocomplete="off">
            <button id="submit-btn">Submit</button>
            <div id="feedback"></div>
            <button id="next-btn">Next</button>
            <div id="progress">Question: 0/5</div>
        </div>
    </div>
    
    <div id="score-display">SCORE: 0</div>
    <div id="timer-display">Time: 0.0s</div>
    <div id="musicControl">🔈 Music: ON</div>

    <!-- Audio elements -->
    <div id="audioContainer">
        <audio id="clickSound" src="assets/audio/click.mp3" preload="auto"></audio>
        <audio id="backgroundMusic" src="assets/audio/bgm.mp3" preload="auto" loop></audio>
        <audio id="correctSound" src="assets/audio/correct.mp3" preload="auto"></audio>
        <audio id="wrongSound" src="assets/audio/wrong.mp3" preload="auto"></audio>
        <audio id="congratsSound" src="assets/audio/congrats.mp3" preload="auto"></audio>
    </div>

    <script>
        // Game elements
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const clueText = document.getElementById('clue-text');
        const letterBoxes = document.getElementById('letter-boxes');
        const answerInput = document.getElementById('answer-input');
        const submitBtn = document.getElementById('submit-btn');
        const feedback = document.getElementById('feedback');
        const nextBtn = document.getElementById('next-btn');
        const scoreDisplay = document.getElementById('score-display');
        const timerDisplay = document.getElementById('timer-display');
        const progressDisplay = document.getElementById('progress');
        const speakerDisplay = document.getElementById('speaker');
        const musicControl = document.getElementById('musicControl');
        const whiteboard = document.getElementById('whiteboard');
        
        // Audio elements
        const clickSound = document.getElementById('clickSound');
        const backgroundMusic = document.getElementById('backgroundMusic');
        const correctSound = document.getElementById('correctSound');
        const wrongSound = document.getElementById('wrongSound');
        const congratsSound = document.getElementById('congratsSound');
        
        // Game state
        let allFurniture = [];
        let bgImage = new Image();
        let whiteboardImage = new Image();
        let score = 0;
        let currentQuestionIndex = 0;
        let startTime;
        let timerInterval;
        let selectedQuestions = [];
        let gameActive = false;
        let musicOn = true;
        let totalQuestions = 5;
        
        // Game constants
        const BASE_SCORE = 100;
        const TIME_PENALTY_PER_SECOND = 2;
        const MAX_TIME = 30;

        // Initialize canvas size
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            drawScene();
        }
        window.addEventListener("resize", resizeCanvas);
        resizeCanvas();

        // Play sound function
        function playSound(sound) {
            if (!musicOn) return;
            sound.currentTime = 0;
            sound.play().catch(e => console.log("Sound playback prevented:", e));
        }

        // Background music control
        function toggleMusic() {
            musicOn = !musicOn;
            if (musicOn) {
                backgroundMusic.play();
                musicControl.textContent = "🔈 Music: ON";
            } else {
                backgroundMusic.pause();
                musicControl.textContent = "🔇 Music: OFF";
            }
        }

        musicControl.addEventListener("click", toggleMusic);

        // Start background music (after user interaction)
        function startBackgroundMusic() {
            if (musicOn) {
                backgroundMusic.volume = 0.3;
                backgroundMusic.loop = true;
                backgroundMusic.play().catch(e => {
                    console.log("Background music playback prevented:", e);
                });
            }
        }

        // Draw the scene with classroom and furniture
        function drawScene() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw background
            if (bgImage.complete) {
                ctx.drawImage(bgImage, 0, 0, canvas.width, canvas.height);
            }

            // Draw furniture
            allFurniture.forEach(item => {
                if (item.img && item.img.complete) {
                    ctx.drawImage(item.img, item.x, item.y, item.w, item.h);
                }
            });
        }

        // Initialize the game
        function initGame() {
            // Load background and furniture first
            fetch("furniture.json")
                .then(response => response.json())
                .then(data => {
                    allFurniture = data.furniture;

                    // Load background image
                    bgImage.src = "assets/classroom.png";
                    bgImage.onload = () => {
                        // Load furniture images
                        allFurniture.forEach(item => {
                            item.img = new Image();
                            item.img.src = item.src;
                            item.img.onload = drawScene;
                        });
                        drawScene();
                        
                        // Then load the questions
                        fetch("level3_questions.json")
                            .then(response => response.json())
                            .then(data => {
                                // Select 5 random questions
                                selectedQuestions = getRandomQuestions(data.questions, totalQuestions);
                                
                                // Start the first question
                                startQuestion();
                            })
                            .catch(error => {
                                console.error('Error loading questions:', error);
                                clueText.textContent = "Failed to load questions. Please try again.";
                            });
                    };
                })
                .catch(err => {
                    console.error("Failed to load furniture data:", err);
                    // Load questions even if furniture fails
                    fetch("level3_questions.json")
                        .then(response => response.json())
                        .then(data => {
                            selectedQuestions = getRandomQuestions(data.questions, totalQuestions);
                            startQuestion();
                        })
                        .catch(error => {
                            console.error('Error loading questions:', error);
                            clueText.textContent = "Failed to load game data. Please try again.";
                        });
                });
            
            // Set up event listeners
            submitBtn.addEventListener('click', checkAnswer);
            nextBtn.addEventListener('click', startNextQuestion);
            
            // Also allow Enter key to submit
            answerInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    checkAnswer();
                }
            });

            // Start music on first interaction
            document.addEventListener('click', () => {
                startBackgroundMusic();
            }, { once: true });
        }
        
        // Get random questions from the pool
        function getRandomQuestions(questions, count) {
            const shuffled = [...questions];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled.slice(0, count);
        }
        
        // Start a new question
        function startQuestion() {
            if (currentQuestionIndex >= selectedQuestions.length) {
                endGame();
                return;
            }
            
            const question = selectedQuestions[currentQuestionIndex];
            
            // Update progress
            progressDisplay.textContent = `Question: ${currentQuestionIndex + 1}/${totalQuestions}`;
            
            // Set up the clue
            clueText.textContent = question.clue;
            
            // Create letter boxes
            letterBoxes.innerHTML = '';
            for (let i = 0; i < question.answer.length; i++) {
                const box = document.createElement('div');
                box.className = 'letter-box';
                box.textContent = '_';
                letterBoxes.appendChild(box);
            }
            
            // Reset input and feedback
            answerInput.value = '';
            answerInput.style.display = 'block';
            submitBtn.style.display = 'block';
            feedback.textContent = '';
            feedback.className = '';
            nextBtn.style.display = 'none';
            
            // Focus the input field
            answerInput.focus();
            
            // Start timer
            startTime = Date.now();
            updateTimer();
            timerInterval = setInterval(updateTimer, 100);
            
            gameActive = true;
        }
        
        // Update the timer display
        function updateTimer() {
            const currentTime = Date.now();
            const elapsedTime = (currentTime - startTime) / 1000;
            timerDisplay.textContent = `Time: ${elapsedTime.toFixed(1)}s`;
        }
        
        // Check the player's answer
        function checkAnswer() {
            if (!gameActive) return;
            
            clearInterval(timerInterval);
            gameActive = false;
            
            const currentTime = Date.now();
            const elapsedTime = (currentTime - startTime) / 1000;
            const question = selectedQuestions[currentQuestionIndex];
            
            // Normalize the answer
            const playerAnswer = answerInput.value.trim().toLowerCase();
            
            // Check if answer is correct
            const isCorrect = playerAnswer === question.answer.toLowerCase();
            
            if (isCorrect) {
                // Calculate score based on time
                const timeBonus = Math.max(0, BASE_SCORE - Math.floor(elapsedTime * TIME_PENALTY_PER_SECOND));
                score += timeBonus;
                scoreDisplay.textContent = `SCORE: ${score}`;
                
                // Show feedback
                feedback.textContent = "Correct!";
                feedback.className = "correct";
                
                // Play correct sound
                playSound(correctSound);
                
                // Fill in the letter boxes with the correct answer
                const boxes = letterBoxes.querySelectorAll('.letter-box');
                for (let i = 0; i < question.answer.length; i++) {
                    boxes[i].textContent = question.answer[i].toUpperCase();
                }
            } else {
                // Wrong answer
                feedback.textContent = `Incorrect! The answer was "${question.answer}".`;
                feedback.className = "incorrect";
                
                // Play wrong sound
                playSound(wrongSound);
                
                // Show the correct answer in the boxes
                const boxes = letterBoxes.querySelectorAll('.letter-box');
                for (let i = 0; i < question.answer.length; i++) {
                    boxes[i].textContent = question.answer[i].toUpperCase();
                    boxes[i].style.color = "red";
                }
            }
            
            // Show next button
            answerInput.style.display = 'none';
            submitBtn.style.display = 'none';
            nextBtn.style.display = 'block';
        }
        
        // Start the next question
        function startNextQuestion() {
            playSound(clickSound);
            currentQuestionIndex++;
            startQuestion();
        }
        
        // End the game
        function endGame() {
            // Play congratulations sound
            playSound(congratsSound);
            
            // Hide game elements
            clueText.textContent = "Congratulations!";
            letterBoxes.innerHTML = '';
            answerInput.style.display = 'none';
            submitBtn.style.display = 'none';
            nextBtn.style.display = 'none';
            
            // Show final score
            feedback.textContent = `Your final score is ${score}!`;
            feedback.className = "correct";
            feedback.style.fontSize = "24px";
            
            // Redirect to next level after delay
        }
        
        // Start the game when the page loads
        window.onload = initGame;
    </script>
</body>
</html>

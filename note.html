            itemsToFind.forEach((item) => (item.img.src = item.src));
            furniture1.forEach((f) => (f.img.src = f.src));
            furniture2.forEach((f) => (f.img.src = f.src));

            const bgImage = new Image();
            bgImage.src = "assets/classroom.png";

            function drawScene() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(bgImage, 0, 0, canvas.width, canvas.height);

                furniture1.forEach((f) => {
                    ctx.drawImage(f.img, f.x, f.y, f.w, f.h);
                });

                furniture2.forEach((f) => {
                    ctx.drawImage(f.img, f.x, f.y, f.w, f.h);
                });

                if (gameState === "playing") {
                    itemsToFind.forEach((item) => {
                        if (!item.found) {
                            ctx.drawImage(
                                item.img,
                                item.x,
                                item.y,
                                item.w,
                                item.h
                            );
                        } else {
                            ctx.strokeStyle = "green";
                            ctx.lineWidth = 3;
                            ctx.strokeRect(item.x, item.y, item.w, item.h);
                        }
                    });
                }
            }

            function updateDialogue() {
                if (dialogueIndex < dialogues.length) {
                    dialogueBox.textContent = dialogues[dialogueIndex++];
                } else {
                    startGame();
                }
            }

            function startGame() {
                gameState = "playing";
                dialogueBox.textContent = "";
                itemListDisplay.innerHTML =
                    "Find: " + itemsToFind.map((i) => i.name).join(", ");
                startTime = Date.now();
                drawScene();
            }

            canvas.addEventListener("click", (e) => {
                if (gameState !== "playing") return;
                const rect = canvas.getBoundingClientRect();
                const clickX = e.clientX - rect.left;
                const clickY = e.clientY - rect.top;

                let foundItem = false;
                itemsToFind.forEach((item) => {
                    if (
                        !item.found &&
                        clickX >= item.x &&
                        clickX <= item.x + item.w &&
                        clickY >= item.y &&
                        clickY <= item.y + item.h
                    ) {
                        item.found = true;
                        foundItem = true;
                    }
                });

                if (foundItem) {
                    drawScene();
                    if (itemsToFind.every((item) => item.found)) {
                        endGame();
                    }
                } else {
                    wrongClicks++;
                }
            });

            function endGame() {
                const timeTaken = (Date.now() - startTime) / 1000;
                score = Math.max(
                    1000 -
                        Math.floor(timeTaken * 10) -
                        (wrongClicks > 2 ? (wrongClicks - 2) * 50 : 0),
                    0
                );
                scoreDisplay.textContent = "Score: " + score;
                gameState = "ended";
                dialogueBox.textContent = "Thanks for your help!";
            }

            canvas.addEventListener("mousedown", () => {
                if (gameState === "prologue") {
                    updateDialogue();
                }
            });

            bgImage.onload = () => drawScene();

<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Find the Object</title>
        <style>
            body {
                margin: 0;
                overflow: hidden;
                background-color: #f0f0f0;
                font-family: Arial, sans-serif;
            }
            canvas {
                display: block;
                background: #fff;
                margin: auto;
                cursor: pointer;
            }
            #ui {
                position: absolute;
                top: 10px;
                left: 10px;
                color: black;
                background: rgba(255, 255, 255, 0.7);
                padding: 10px;
                border-radius: 5px;
                max-width: 300px;
            }
            #itemList {
                margin-top: 10px;
                font-weight: bold;
            }
            #scoreDisplay {
                margin-top: 10px;
                font-size: 1.2em;
                font-weight: bold;
            }
            #timerDisplay {
                margin-top: 10px;
                font-size: 1.2em;
                font-weight: bold;
            }
            .found-item {
                text-decoration: line-through;
                color: green;
            }
            #audioContainer {
                display: none;
            }
            #musicControl {
                position: absolute;
                bottom: 10px;
                left: 10px;
                background: rgba(255, 255, 255, 0.7);
                padding: 5px 10px;
                border-radius: 5px;
                cursor: pointer;
            }
            .score-popup {
                position: absolute;
                font-size: 24px;
                font-weight: bold;
                text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
                z-index: 100;
                pointer-events: none;
                animation: scorePop 2s forwards;
            }
            @keyframes scorePop {
                0% { transform: scale(0.5); opacity: 0; }
                30% { transform: scale(1.2); opacity: 1; }
                70% { transform: scale(1.2); opacity: 1; }
                100% { transform: scale(1); opacity: 0; top: -50px; }
            }
            .positive-score {
                color: #4CAF50;
            }
            .negative-score {
                color: #F44336;
            }
        </style>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
    </head>
    <body>
        <canvas id="gameCanvas"></canvas>
        <div id="ui">
            <div id="dialogueBox">Click to start...</div>
            <div id="itemList"></div>
            <div id="scoreDisplay">Score: 0</div>
            <div id="timerDisplay">Time: 0.0s</div>
        </div>
        <div id="musicControl">🔈 Music: ON</div>

        <!-- Audio elements for sound effects -->
        <div id="audioContainer">
            <audio id="clickSound" src="assets/audio/click.mp3" preload="auto"></audio>
            <audio id="foundSound" src="assets/audio/found.mp3" preload="auto"></audio>
            <audio id="wrongSound" src="assets/audio/wrong.mp3" preload="auto"></audio>
            <audio id="congratsSound" src="assets/audio/congrats.mp3" preload="auto"></audio>
            <audio id="backgroundMusic" src="assets/audio/bgm.mp3" preload="auto" loop></audio>
        </div>

        <script>
            // Game elements
            const canvas = document.getElementById("gameCanvas");
            const ctx = canvas.getContext("2d");
            const dialogueBox = document.getElementById("dialogueBox");
            const itemListDisplay = document.getElementById("itemList");
            const scoreDisplay = document.getElementById("scoreDisplay");
            const timerDisplay = document.getElementById("timerDisplay");
            const clickSound = document.getElementById("clickSound");
            const foundSound = document.getElementById("foundSound");
            const wrongSound = document.getElementById("wrongSound");
            const congratsSound = document.getElementById("congratsSound");
            const backgroundMusic = document.getElementById("backgroundMusic");
            const musicControl = document.getElementById("musicControl");

            // Game state
            let gameState = "prologue";
            let dialogueIndex = 0;
            let startTime;
            let score = 0;
            let wrongClicks = 0;
            let itemsToFind = [];
            let allFurniture = [];
            let bgImage = new Image();
            let loadedImages = 0;
            let totalImagesToLoad = 0;
            let musicOn = true;
            let gameTimer;
            let elapsedTime = 0;

            // Game constants
            const DIALOGUES = [
                "YAMAL: There's some items I need to find in this classroom.",
            ];
            const ITEMS_TO_FIND_COUNT = 5;
            const ZOOM_SCALE = 3;
            const ZOOM_DURATION = 1;
            const BASE_SCORE = 100;
            const TIME_PENALTY = 10; // Points lost per second
            const WRONG_CLICK_PENALTY = 50;
            const WRONG_CLICK_THRESHOLD = 3;
            const REDIRECT_DELAY = 30000; // 3 seconds before redirect

            // Initialize canvas size
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                if (gameState !== "prologue") drawScene();
            }
            window.addEventListener("resize", resizeCanvas);
            resizeCanvas();

            // Play sound function
            function playSound(sound) {
                if (!musicOn) return;
                sound.currentTime = 0;
                sound.play().catch(e => console.log("Sound playback prevented:", e));
            }

            // Background music control
            function toggleMusic() {
                musicOn = !musicOn;
                if (musicOn) {
                    backgroundMusic.play();
                    musicControl.textContent = "🔈 Music: ON";
                } else {
                    backgroundMusic.pause();
                    musicControl.textContent = "🔇 Music: OFF";
                }
            }

            musicControl.addEventListener("click", toggleMusic);

            // Start background music
            function startBackgroundMusic() {
                if (musicOn) {
                    backgroundMusic.volume = 0.3;
                    backgroundMusic.loop = true;
                    backgroundMusic.play().catch(e => {
                        console.log("Background music playback prevented:", e);
                        dialogueBox.textContent = "Click to enable sound...";
                    });
                }
            }

            // Create score popup animation
            function createScorePopup(amount, x, y, isPositive = true) {
                const popup = document.createElement('div');
                popup.className = `score-popup ${isPositive ? 'positive-score' : 'negative-score'}`;
                popup.textContent = `${isPositive ? '+' : '-'}${amount}`;
                popup.style.left = `${x}px`;
                popup.style.top = `${y}px`;
                document.body.appendChild(popup);
                
                // Remove after animation completes
                setTimeout(() => {
                    popup.remove();
                }, 2000);
            }

            // Update timer display
            function updateTimer() {
                const currentTime = Date.now();
                elapsedTime = (currentTime - startTime) / 1000;
                timerDisplay.textContent = `Time: ${elapsedTime.toFixed(1)}s`;
            }

            // Load game assets
            function loadGameAssets() {
                fetch("furniture.json")
                    .then((response) => response.json())
                    .then((data) => {
                        allFurniture = data.furniture;
                        totalImagesToLoad = allFurniture.length + 1;

                        // Load background image
                        bgImage.src = "assets/classroom.png";
                        bgImage.onload = imageLoaded;

                        // Load furniture images
                        allFurniture.forEach((item) => {
                            item.img = new Image();
                            item.img.src = item.src;
                            item.img.onload = imageLoaded;
                            item.found = false;
                        });

                        // Select random items to find
                        const playableItems = allFurniture.filter(
                            (item) => item.playable
                        );
                        itemsToFind = getRandomItems(
                            playableItems,
                            ITEMS_TO_FIND_COUNT
                        );
                    })
                    .catch((err) =>
                        console.error("Failed to load furniture data:", err)
                    );
            }

            function imageLoaded() {
                loadedImages++;
                if (loadedImages === totalImagesToLoad) {
                    initializeGame();
                }
            }

            function getRandomItems(items, count) {
                const shuffled = [...items].sort(() => 0.5 - Math.random());
                return shuffled.slice(0, count);
            }

            function initializeGame() {
                updateDialogue();
                drawScene();
            }

            function updateDialogue() {
                if (dialogueIndex >= DIALOGUES.length) {
                    startGame();
                    return;
                }

                if (dialogueIndex === 2) {
                    dialogueBox.textContent =
                        DIALOGUES[dialogueIndex] +
                        itemsToFind.map((i) => i.name).join(", ");
                } else {
                    dialogueBox.textContent = DIALOGUES[dialogueIndex];
                }
                dialogueIndex++;
            }

            function drawScene() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // Draw background
                if (bgImage.complete) {
                    ctx.drawImage(
                        bgImage,
                        0,
                        0,
                        canvas.width,
                        canvas.height
                    );
                }

                // Draw furniture
                allFurniture.forEach((item) => {
                    if (!itemsToFind.includes(item) || !item.found) {
                        ctx.drawImage(item.img, item.x, item.y, item.w, item.h);
                    }
                });

                // Highlight found items
                // itemsToFind.forEach((item) => {
                //     if (item.found) {
                //         ctx.strokeStyle = "green";
                //         ctx.lineWidth = 3;
                //         ctx.strokeRect(item.x, item.y, item.w, item.h);
                //     }
                // });
            }

            function updateItemList() {
                itemListDisplay.innerHTML = itemsToFind
                    .map(
                        (item) =>
                            `<span class="${
                                item.found ? "found-item" : ""
                            }">${item.name}</span>`
                    )
                    .join(", ");
            }

            function handleItemClick(item, clickX, clickY) {
                // Play found sound
                playSound(foundSound);
                
                item.found = true;
                updateItemList();

                // Calculate score with time penalty
                const timeBonus = Math.max(0, 500 - Math.floor(elapsedTime * TIME_PENALTY));
                const scoreAdded = BASE_SCORE + timeBonus;
                score += scoreAdded;
                
                // Create score popup at click location
                createScorePopup(scoreAdded, clickX, clickY);
                scoreDisplay.textContent = `Score: ${score}`;

                // Create a clone of the item for animation
                const animItem = { ...item };
                
                // Animate the item
                gsap.to(animItem, {
                    duration: ZOOM_DURATION,
                    x: canvas.width / 2 - (animItem.w * ZOOM_SCALE) / 2,
                    y: canvas.height / 2 - (animItem.h * ZOOM_SCALE) / 2,
                    width: animItem.w * ZOOM_SCALE,
                    height: animItem.h * ZOOM_SCALE,
                    onUpdate: () => {
                        // Draw the animation frame
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                        drawScene();
                        ctx.drawImage(
                            animItem.img,
                            animItem.x,
                            animItem.y,
                            animItem.width,
                            animItem.height
                        );
                    },
                    onComplete: () => {
                        // Check game completion
                        if (itemsToFind.every((item) => item.found)) {
                            endGame();
                        } else {
                            drawScene();
                        }
                    },
                });
            }

            function handleWrongClick(clickX, clickY) {
                wrongClicks++;
                playSound(wrongSound);
                
                // Apply penalty if threshold is reached
                if (wrongClicks > WRONG_CLICK_THRESHOLD) {
                    const penalty = WRONG_CLICK_PENALTY;
                    score = Math.max(0, score - penalty);
                    scoreDisplay.textContent = `Score: ${score}`;
                    createScorePopup(penalty, clickX, clickY, false);
                    
                    // Show warning message
                    dialogueBox.textContent = `Wrong click! -${penalty} points!`;
                    setTimeout(() => {
                        if (gameState === "playing") {
                            dialogueBox.textContent = "Find the items!";
                        }
                    }, 1500);
                }
            }

            function startGame() {
                gameState = "playing";
                startTime = Date.now();
                dialogueBox.textContent = "Find the items!";
                updateItemList();
                drawScene();
                startBackgroundMusic();
                
                // Start game timer
                gameTimer = setInterval(updateTimer, 100);
            }

            function endGame() {
                clearInterval(gameTimer);
                
                // Play congratulations sound
                playSound(congratsSound);
                
                // Calculate final score with penalties
                const timePenalty = Math.floor(elapsedTime * TIME_PENALTY);
                const wrongClickPenalty = Math.max(0, wrongClicks - WRONG_CLICK_THRESHOLD) * WRONG_CLICK_PENALTY;
                const finalScore = Math.max(0, score - wrongClickPenalty);
                
                scoreDisplay.textContent = `Final Score: ${finalScore}`;
                gameState = "ended";
                dialogueBox.textContent = `Congratulations! You found all items in ${elapsedTime.toFixed(1)} seconds!`;
                
                // Redirect to next page after delay
                setTimeout(() => {
                    window.location.href = "level1end.html";
                }, REDIRECT_DELAY);
            }

            // Event listeners
            canvas.addEventListener("click", (e) => {
                // Play click sound on any click
                playSound(clickSound);
                
                if (gameState === "prologue") {
                    updateDialogue();
                    return;
                }

                if (gameState !== "playing") return;

                const rect = canvas.getBoundingClientRect();
                const clickX = e.clientX - rect.left;
                const clickY = e.clientY - rect.top;

                let clickedItem = itemsToFind.find(
                    (item) =>
                        !item.found &&
                        clickX >= item.x &&
                        clickX <= item.x + item.w &&
                        clickY >= item.y &&
                        clickY <= item.y + item.h
                );

                if (clickedItem) {
                    handleItemClick(clickedItem, e.clientX, e.clientY);
                } else {
                    handleWrongClick(e.clientX, e.clientY);
                }
            });

            // Start the game
            loadGameAssets();
        </script>
    </body>
</html>

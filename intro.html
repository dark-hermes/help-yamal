<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Find the Object</title>
        <style>
            body {
                margin: 0;
                overflow: hidden;
                background-color: #f0f0f0;
                font-family: Arial, sans-serif;
            }
            canvas {
                display: block;
                background: #fff;
                margin: auto;
                cursor: pointer;
            }
            #ui {
                position: absolute;
                top: 10px;
                left: 10px;
                color: black;
                background: rgba(255, 255, 255, 0.7);
                padding: 10px;
                border-radius: 5px;
                max-width: 300px;
            }
            #itemList {
                margin-top: 10px;
                font-weight: bold;
            }
            #scoreDisplay {
                margin-top: 10px;
                font-size: 1.2em;
            }
            .found-item {
                text-decoration: line-through;
                color: green;
            }
            #audioContainer {
                display: none; /* Hide audio elements */
            }
        </style>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
    </head>
    <body>
        <canvas id="gameCanvas"></canvas>
        <div id="ui">
            <div id="dialogueBox">Click to start...</div>
            <div id="itemList"></div>
            <div id="scoreDisplay">Score: 0</div>
        </div>

        <!-- Audio elements for sound effects -->
        <div id="audioContainer">
            <audio id="clickSound" src="assets/audio/click.mp3" preload="auto"></audio>
            <audio id="foundSound" src="assets/audio/found.mp3" preload="auto"></audio>
        </div>

        <script>
            // Game elements
            const canvas = document.getElementById("gameCanvas");
            const ctx = canvas.getContext("2d");
            const dialogueBox = document.getElementById("dialogueBox");
            const itemListDisplay = document.getElementById("itemList");
            const scoreDisplay = document.getElementById("scoreDisplay");
            const clickSound = document.getElementById("clickSound");
            const foundSound = document.getElementById("foundSound");

            // Game state
            let gameState = "prologue";
            let dialogueIndex = 0;
            let startTime;
            let score = 0;
            let wrongClicks = 0;
            let itemsToFind = [];
            let allFurniture = [];
            let bgImage = new Image();
            let loadedImages = 0;
            let totalImagesToLoad = 0;

            // Game constants
            const DIALOGUES = [
                "Hey! Can you help me find my stuff?",
                "I lost a few things in the classroom.",
                "Please find: ",
            ];
            const ITEMS_TO_FIND_COUNT = 5;
            const ZOOM_SCALE = 3;
            const ZOOM_DURATION = 1;

            // Initialize canvas size
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                if (gameState !== "prologue") drawScene();
            }
            window.addEventListener("resize", resizeCanvas);
            resizeCanvas();

            // Play sound function
            function playSound(sound) {
                sound.currentTime = 0; // Rewind to start
                sound.play().catch(e => console.log("Sound playback prevented:", e));
            }

            // Load game assets
            function loadGameAssets() {
                fetch("intro.json")
                    .then((response) => response.json())
                    .then((data) => {
                        allFurniture = data.furniture;
                        totalImagesToLoad = allFurniture.length + 1; // +1 for background

                        // Load background image
                        bgImage.src = "assets/classroom.png";
                        bgImage.onload = imageLoaded;

                        // Load furniture images
                        allFurniture.forEach((item) => {
                            item.img = new Image();
                            item.img.src = item.src;
                            item.img.onload = imageLoaded;
                            item.found = false;
                        });

                        // Select random items to find
                        const playableItems = allFurniture.filter(
                            (item) => item.playable
                        );
                        itemsToFind = getRandomItems(
                            playableItems,
                            ITEMS_TO_FIND_COUNT
                        );
                    })
                    .catch((err) =>
                        console.error("Failed to load furniture data:", err)
                    );
            }

            function imageLoaded() {
                loadedImages++;
                if (loadedImages === totalImagesToLoad) {
                    // All images loaded
                    initializeGame();
                }
            }

            function getRandomItems(items, count) {
                const shuffled = [...items].sort(() => 0.5 - Math.random());
                return shuffled.slice(0, count);
            }

            function initializeGame() {
                updateDialogue();
                drawScene();
            }

            function updateDialogue() {
                if (dialogueIndex >= DIALOGUES.length) {
                    startGame();
                    return;
                }

                if (dialogueIndex === 2) {
                    dialogueBox.textContent =
                        DIALOGUES[dialogueIndex] +
                        itemsToFind.map((i) => i.name).join(", ");
                } else {
                    dialogueBox.textContent = DIALOGUES[dialogueIndex];
                }
                dialogueIndex++;
            }

            function drawScene() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // Draw background
                if (bgImage.complete) {
                    ctx.drawImage(
                        bgImage,
                        0,
                        0,
                        canvas.width,
                        canvas.height
                    );
                }

                // Draw furniture
                allFurniture.forEach((item) => {
                    if (!itemsToFind.includes(item) || !item.found) {
                        ctx.drawImage(item.img, item.x, item.y, item.w, item.h);
                    }
                });

                // // Highlight found items
                // itemsToFind.forEach((item) => {
                //     if (item.found) {
                //         ctx.strokeStyle = "green";
                //         ctx.lineWidth = 3;
                //         ctx.strokeRect(item.x, item.y, item.w, item.h);
                //     }
                // });
            }

            function updateItemList() {
                itemListDisplay.innerHTML = itemsToFind
                    .map(
                        (item) =>
                            `<span class="${
                                item.found ? "found-item" : ""
                            }">${item.name}</span>`
                    )
                    .join(", ");
            }

            function handleItemClick(item) {
                // Play found sound
                playSound(foundSound);
                
                item.found = true;
                updateItemList();

                // Create a clone of the item for animation
                const animItem = { ...item };
                
                // Animate the item
                gsap.to(animItem, {
                    duration: ZOOM_DURATION,
                    x: canvas.width / 2 - (animItem.w * ZOOM_SCALE) / 2,
                    y: canvas.height / 2 - (animItem.h * ZOOM_SCALE) / 2,
                    width: animItem.w * ZOOM_SCALE,
                    height: animItem.h * ZOOM_SCALE,
                    onUpdate: () => {
                        // Draw the animation frame
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                        drawScene();
                        ctx.drawImage(
                            animItem.img,
                            animItem.x,
                            animItem.y,
                            animItem.width,
                            animItem.height
                        );
                    },
                    onComplete: () => {
                        // Update score and check game completion
                        score += 100;
                        scoreDisplay.textContent = `Score: ${score}`;
                        
                        if (itemsToFind.every((item) => item.found)) {
                            endGame();
                        } else {
                            drawScene();
                        }
                    },
                });
            }

            function startGame() {
                gameState = "playing";
                startTime = Date.now();
                dialogueBox.textContent = "Find the items!";
                updateItemList();
                drawScene();
            }

            function endGame() {
                const timeTaken = (Date.now() - startTime) / 1000;
                score = Math.max(
                    1000 -
                        Math.floor(timeTaken * 10) -
                        (wrongClicks > 2 ? (wrongClicks - 2) * 50 : 0),
                    0
                );
                scoreDisplay.textContent = `Final Score: ${score}`;
                gameState = "ended";
                dialogueBox.textContent = `Game Over! You found all items in ${timeTaken.toFixed(
                    1
                )} seconds with ${wrongClicks} wrong clicks.`;
            }

            // Event listeners
            canvas.addEventListener("click", (e) => {
                // Play click sound on any click
                playSound(clickSound);
                
                if (gameState === "prologue") {
                    updateDialogue();
                    return;
                }

                if (gameState !== "playing") return;

                const rect = canvas.getBoundingClientRect();
                const clickX = e.clientX - rect.left;
                const clickY = e.clientY - rect.top;

                let clickedItem = itemsToFind.find(
                    (item) =>
                        !item.found &&
                        clickX >= item.x &&
                        clickX <= item.x + item.w &&
                        clickY >= item.y &&
                        clickY <= item.y + item.h
                );

                if (clickedItem) {
                    handleItemClick(clickedItem);
                } else {
                    wrongClicks++;
                }
            });

            // Start the game
            loadGameAssets();
        </script>
    </body>
</html>
